amcl:
  ros__parameters:
    use_sim_time: True
    # L-Code가 직접 위치를 주므로 AMCL 대신 정적 좌표계를 사용하게 됩니다.
    # 하지만 기본 구조를 위해 최소 설정을 남겨둡니다.

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    transform_tolerance: 1.0
    use_sim_time: True
    controller_frequency: 50.0  # 2mm 정밀도를 위해 제어 주기를 50Hz로 상향
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # 정밀 도착 설정 (Goal Checker)
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.005  # 5mm 이내 도착 시 정지 (점 간격이 2mm이므로 넉넉히 설정)
      yaw_goal_tolerance: 0.05   # 약 3도 오차 허용
      free_goal_velocity: False

    # 경로 추종 설정 (RPP - Regulated Pure Pursuit 추천)
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.15   # 실측 최대 0.2m/s이므로 안전하게 0.15 설정
      lookahead_dist: 0.05       # 좁은 구역이므로 전방 주시 거리를 5cm로 짧게 설정
      min_lookahead_dist: 0.02
      max_lookahead_dist: 0.1
      use_velocity_scaled_lookahead_dist: True
      robot_radius: 0.1          # 로봇 반지름 (실제 크기에 맞춰 수정하세요)
      inflation_cost_scaling_factor: 3.0

planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.01          # 경로 생성 시 1cm 오차 허용
      use_astar: True          # 최단 경로를 위해 A* 알고리즘 사용

local_costmap:
  local_costmap:
    ros__parameters:
      transform_tolerance: 1.0
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 3               # 로봇 주변 50cm만 실시간 감시
      height: 3
      resolution: 0.01        # 지도와 동일한 2mm 해상도
      robot_radius: 0.1        # 로봇 크기
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.05 # 벽(장애물) 근처 5cm 접근 금지

global_costmap:
  global_costmap:
    ros__parameters:
      transform_tolerance: 1.0
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      robot_radius: 0.1
      resolution: 0.002
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.1

map_server:
  ros__parameters:
    use_sim_time: True
    # 아래 라인을 추가하세요. 경로는 실제 파일 위치로 확인이 필요합니다.
    yaml_filename: "" 
    topic_name: "map"
    frame_id: "map"
